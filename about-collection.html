        function initCollection() {
            renderCollectionGrid();
        }

        function renderCollectionGrid() {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = collectionsData.map(cat => `
                <div class="collection-card" onclick="openCollectionDetail('${cat.id}')">
                    <div class="collection-card-icon">${cat.icon}</div>
                    <div class="collection-card-info">
                        <h3>${cat.name}</h3>
                        <p>${cat.count}件藏品</p>
                    </div>
                    <div class="collection-card-bg" style="background: ${cat.color}"></div>
                </div>
            `).join('');
        }

        function openCollectionDetail(catId) {
            const category = collectionsData.find(c => c.id === catId);
            const detail = document.getElementById('collectionDetail');
            const title = document.getElementById('detailTitle');
            const grid = document.getElementById('detailGrid');
            
            title.innerHTML = `${category.icon} ${category.name}`;
            grid.innerHTML = category.items.map(item => `
                <div class="detail-item">
                    <span class="detail-item-year">${item.year}</span>
                    <div class="detail-item-info">
                        <h4>${item.name}</h4>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `).join('');
            
            detail.style.display = 'block';
            setTimeout(() => {
                detail.classList.add('active');
            }, 10);
        }

        function closeCollectionDetail() {
            const detail = document.getElementById('collectionDetail');
            detail.classList.remove('active');
            setTimeout(() => {
                detail.style.display = 'none';
            }, 300);
        }

        document.getElementById('collectionDetail').addEventListener('click', function(e) {
            if (e.target === this) closeCollectionDetail();
        });

        document.addEventListener('DOMContentLoaded', initCollection);
    </script>
