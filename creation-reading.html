<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 读书笔记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="logo">薛大侠</a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">首页</a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link">关于我</a>
                </li>
                <li class="nav-item">
                    <a href="creation.html" class="nav-link active">内容创作</a>
                </li>
                <li class="nav-item">
                    <a href="resources.html" class="nav-link">服务中心</a>
                </li>
                <li class="nav-item">
                    <a href="site-info.html" class="nav-link">站点信息</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <h1>📚 读书笔记</h1>
            <p>记录每一本打动我的书籍，分享我的阅读感受和思考。</p>
        </div>

        <div class="movie-card-grid">
            <div class="movie-card-item" data-movie="1984">
                <div class="movie-card-poster">
                    <img src="images/book-1984.jpg" alt="1984" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%201984%20george%20orwell%20dystopian%20dark%20surveillance%20big%20brother%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">1984</span>
                    <span class="movie-card-year">乔治·奥威尔</span>
                </div>
            </div>

            <div class="movie-card-item" data-movie="sapiens">
                <div class="movie-card-poster">
                    <img src="images/book-sapiens.jpg" alt="人类简史" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%20sapiens%20human%20history%20civilization%20evolution%20colorful%20artistic%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">人类简史</span>
                    <span class="movie-card-year">尤瓦尔·赫拉利</span>
                </div>
            </div>

            <div class="movie-card-item" data-movie="thinking">
                <div class="movie-card-poster">
                    <img src="images/book-thinking.jpg" alt="思考，快与慢" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%20thinking%20fast%20and%20slow%20psychology%20brain%20cognitive%20science%20professional%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">思考，快与慢</span>
                    <span class="movie-card-year">丹尼尔·卡尼曼</span>
                </div>
            </div>

            <div class="movie-card-item" data-movie="deepwork">
                <div class="movie-card-poster">
                    <img src="images/book-deepwork.jpg" alt="深度工作" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%20deep%20work%20productivity%20focus%20minimalist%20professional%20workspace%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">深度工作</span>
                    <span class="movie-card-year">卡尔·纽波特</span>
                </div>
            </div>

            <div class="movie-card-item" data-movie="atomic">
                <div class="movie-card-poster">
                    <img src="images/book-atomic.jpg" alt="原子习惯" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%20atomic%20habits%20self%20improvement%20success%20minimalist%20modern%20clean%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">原子习惯</span>
                    <span class="movie-card-year">詹姆斯·克利尔</span>
                </div>
            </div>

            <div class="movie-card-item" data-movie="hobbit">
                <div class="movie-card-poster">
                    <img src="images/book-hobbit.jpg" alt="霍比特人" onerror="this.src='https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=book%20cover%20the%20hobbit%20fantasy%20adventure%20middle%20earth%20magical%20elves%20vertical&image_size=portrait_2_3'">
                </div>
                <div class="movie-card-content">
                    <span class="movie-card-title">霍比特人</span>
                    <span class="movie-card-year">J.R.R.托尔金</span>
                </div>
            </div>
        </div>

        <div class="movie-modal-overlay" id="movieModalOverlay">
            <div class="movie-modal" id="movieModal">
                <button class="movie-modal-close" id="movieModalClose">&times;</button>
                <div class="movie-modal-content">
                    <div class="movie-modal-top">
                        <div class="movie-modal-poster">
                            <img id="movieModalImg" src="" alt="">
                        </div>
                        <div class="movie-modal-info">
                            <div class="movie-modal-header">
                                <h2 id="movieModalTitle"></h2>
                                <div class="movie-modal-meta" id="movieModalMeta"></div>
                            </div>
                            <div class="movie-modal-summary">
                                <h3>📖 书籍简介</h3>
                                <p id="movieModalSummary"></p>
                                <div class="movie-modal-hint">
                                    <span class="hint-icon">👇</span>
                                    <span>下方读书笔记，欢迎阅读</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="movie-modal-bottom">
                        <div class="movie-modal-thoughts">
                            <h3>💭 我的感想</h3>
                            <p id="movieModalThoughts"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container" style="text-align: center;">
            <a href="creation.html" class="module-card" style="display: inline-block; width: auto; padding: 1rem 2rem;">
                ← 返回内容创作
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 薛大侠 - 用心记录生活</p>
        <p>v0.4.3</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
